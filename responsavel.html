<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro do Responsável</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page" id="page-responsavel">
    <div class="container">

      <div class="step-indicator">
        <div class="step active">
          <span class="step-number">1</span>
          <span class="step-label">Responsável</span>
        </div>
        <div class="step-line"></div>
        <div class="step">
          <span class="step-number">2</span>
          <span class="step-label">Criança</span>
        </div>
      </div>

      <h1>Cadastro do Responsável</h1>
      <p class="subtitle">Preencha os dados de quem será responsável pela criança.</p>

      <div class="field" id="f-nome">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" placeholder="Ex: Maria da Silva">
        <span class="err">Campo obrigatório</span>
      </div>

      <div class="field" id="f-telefone">
        <label for="telefone">Telefone</label>
        <input type="text" id="telefone" placeholder="(11) 90000-0000" maxlength="15">
        <span class="err">Campo obrigatório</span>
      </div>

      <div class="field" id="f-endereco">
        <label for="endereco">Endereço</label>
        <input type="text" id="endereco" placeholder="Rua, número, bairro">
        <span class="err">Campo obrigatório</span>
      </div>

      <div class="field" id="f-cpf">
        <label for="cpf">CPF</label>
        <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14">
        <span class="err">Campo obrigatório</span>
      </div>

      <button class="btn" onclick="avancar()">Avançar →</button>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
