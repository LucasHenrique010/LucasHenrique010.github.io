<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro Finalizado</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
 
  <div class="page" id="page-sucesso">
    <div class="container">
 
      <div class="success-icon">✓</div>
 
      <h1>Cadastro Finalizado!</h1>
      <p class="subtitle">Todos os dados foram registrados com sucesso.</p>
 
      <div class="summary-card">
        <div class="summary-section">
          <h2>Responsável</h2>
          <div class="summary-row"><span>Nome</span><strong id="s-nome">—</strong></div>
          <div class="summary-row"><span>Telefone</span><strong id="s-telefone">—</strong></div>
          <div class="summary-row"><span>Endereço</span><strong id="s-endereco">—</strong></div>
          <div class="summary-row"><span>CPF</span><strong id="s-cpf">—</strong></div>
        </div>
 
        <div class="divider"></div>
 
        <div class="summary-section">
          <h2>Criança</h2>
          <div class="summary-row"><span>Nome</span><strong id="s-nome-crianca">—</strong></div>
          <div class="summary-row"><span>Idade</span><strong id="s-idade">—</strong></div>
          <div class="summary-row"><span>Escola</span><strong id="s-escola">—</strong></div>
        </div>
      </div>
 
      <button class="btn" onclick="novoCadastro()">Novo Cadastro</button>
 
    </div>
  </div>
 
  <script src="script.js"></script>
  <script>
    carregarResumo();
  </script>
</body>
</html>
